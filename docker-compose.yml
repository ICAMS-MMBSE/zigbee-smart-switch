services:
  mqtt5-broker:
    image: eclipse-mosquitto
    container_name: mqtt5-broker
    ports:
      - "1883:1883" 
      - "9001:9001" 
    volumes:
      - ./mqtt5/config:/mosquitto/config:rw
      - ./mqtt5/data:/mosquitto/data:rw
      - ./mqtt5/log:/mosquitto/log:rw
    restart: unless-stopped


volumes:
  config:
  data:
  log:
  
networks:
  default:
    name: mqtt5-network
